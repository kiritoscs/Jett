name: Build and Push Images

on:
  push:
    tags:
      - 'v*'

env:
  # Default to GHCR, but can be overridden by secrets
  REGISTRY: ${{ secrets.IMAGE_REGISTRY || 'ghcr.io' }}
  REGISTRY_NAMESPACE: ${{ secrets.REGISTRY_NAMESPACE || 'kiritoscs' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: extract_tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Build and push RapidOCR image
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REGISTRY_NAMESPACE: ${{ env.REGISTRY_NAMESPACE }}
        run: |
          python build_images.py ${{ steps.extract_tag.outputs.TAG }} --service=rapidocr

      - name: Build and push WebUI image
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REGISTRY_NAMESPACE: ${{ env.REGISTRY_NAMESPACE }}
        run: |
          python build_images.py ${{ steps.extract_tag.outputs.TAG }} --service=webui
